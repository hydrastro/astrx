repos:
-   repo: local
    hooks:
    -   id: phpstan
        name: Check for phpstan passing
        entry: ./vendor/bin/phpstan analyse src --level=8
        language: system
        types:
        - php
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: check-merge-conflict
