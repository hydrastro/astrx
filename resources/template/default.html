<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <!--
         _        _      __  __
        / \   ___| |_ _ _\ \/ /
       / _ \ / __| __| '__\  /
      / ___ \\__ \ |_| |  /  \
     /_/   \_\___/\__|_| /_/\_\

	Copyright (c) {{year}}-->
    <title>{{title}}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="author" content="{{website_name}}"/>
    <meta name="dcterms.dateCopyrighted" content="{{year}}"/>
    <meta name="dcterms.rights" content="All Rights Reserved."/>
    <meta name="dcterms.rightsHolder" content="{{website_name}}"/>
    <meta name="description" content="{{description}}"/>
    <meta name="keywords" content="{{keywords}}"/>
    <meta name="robots"
          content="{{^index}}no{{/index}}index, {{^follow}}no{{/follow}}follow"/>
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1;"/>
    <link rel="icon" type="icon/ico" href="{{icon}}"/>
    <style>{{&css}}</style>
</head>
<body>
<div id="wrap">
    <div id="header">
        <h1 id="title"><a href="{{title_url}}">{{website_name}}</a></h1>
    </div>
    <div id="top_nav">
        <ul id="nav" class="nav">{{#navbar}}<li><a href="{{url}}"{{#highlight}} class="active"{{/highlight}}>{{name}}</a></li>{{/navbar}}
        </ul>
    </div>
    {{#got_results}}
    <div id="status_bar">{{#results}}<p class="{{css_class}}">[{{level_label}}] {{message}}</p>{{/results}}
    </div>{{/got_results}}
    <div id="main">
        {{>include}}
        <p id="go_top">{{generated_in}} {{time}}s<span class="right"><a
                href="#">{{go_top}}</a></span></p>
    </div>
    <div id="footer">
        <p class="left"><a href="">{{ip}}</a></p>
        <p class="right">Copyright &copy; {{year}} - <a
                href="{{cur}}">{{website_name}}</a></p>
        <div class="clear"></div>
    </div>
</div>
</body>
</html>
